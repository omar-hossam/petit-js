<!DOCTYPE html>
<html lang="en">
  <head></head>
  <body>
    <!-- App Variables goes at the start -->
    <script>
      window.myApp = window.myApp || {
        num: 1, 
        username: "omar-hossam",
        hobbies: ["coding", "chess", "language learning", "swimming"],
        isDeveloper: true,
        increaseNum: function() {
          this.num++;
        }
      };
    </script>
    
    <ul h-for="hobby in myApp.hobbies">
      <li h-text="hobby"></li>
    </ul>

    <button onclick="log(`NUM: ${myApp.num}`)">Log</button>
    
    <button onclick="
      myApp.increaseNum();
      log(myApp.num)
    ">Increase</button>
    
    <button onclick="myApp.num = 0">Reset</button>
    
    <script src="../qalam.js"></script>
  </body>
</html>
